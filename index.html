<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Biblioteca de IDs - Free Fire</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CONFIGURACIÓN GENERAL --- */
        * {
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }
        
        body {
            background: radial-gradient(circle at 50% 0%, #1c1c3a 0%, #0a0a0f 70%, #050507 100%);
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #ff7b00; 
            margin-bottom: 5px;
            font-size: 32px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 123, 0, 0.4);
        }
        p { 
            color: #8fa0ba; 
            margin-top: 0;
            font-size: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        
        /* --- BUSCADOR --- */
        .search-box {
            position: relative;
            max-width: 550px;
            margin: 0 auto 25px auto;
            width: 90%;
        }
        #buscador {
            width: 100%;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            border: 2px solid #252542;
            background: rgba(15, 15, 26, 0.8);
            color: #fff;
            outline: none;
        }

        /* --- FILTROS DE CATEGORÍAS --- */
        .filtros-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 1000px;
            margin: 0 auto 35px auto;
            padding: 0 15px;
        }
        @media (max-width: 600px) {
            .filtros-container {
                flex-wrap: nowrap;
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 10px;
                scrollbar-width: none;
            }
            .filtros-container::-webkit-scrollbar { display: none; }
        }

        .btn-filtro {
            background: rgba(30, 30, 48, 0.5);
            color: #92a2b8;
            border: 1px solid #323254;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        .btn-filtro.activo {
            background: linear-gradient(135deg, #ff8800 0%, #ff4400 100%);
            color: #fff;
            border: none;
            box-shadow: 0 0 20px rgba(255, 68, 0, 0.5);
        }

        /* --- REJILLA DE TARJETAS --- */
        .contenedor {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .tarjeta {
            background: linear-gradient(135deg, rgba(28, 28, 45, 0.8) 0%, rgba(16, 16, 26, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .tarjeta:hover {
            transform: translateY(-5px);
            border-color: #ff7b00;
        }
        
        .img-wrapper {
            background: #09090f;
            border-radius: 12px;
            padding: 8px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tarjeta img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .tarjeta h3 {
            font-size: 16px;
            color: #f0f3f8;
            margin: 15px 0 10px 0;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .id-texto {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: #00ffaa;
            background: rgba(0, 255, 170, 0.05);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
            display: block;
            border: 1px solid rgba(0, 255, 170, 0.2);
        }

        /* ========================================================
           🔥 VENTANA FLOTANTE ESTILO CAPTURA (MODAL INFO)
        =========================================================== */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
        }
        
        .modal-content {
            background: #0d0d0d;
            border-radius: 24px;
            width: 90%;
            max-width: 360px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid #1a1a1a;
            padding: 20px;
            text-align: left;
            transform: scale(0.85);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .modal.visible .modal-content {
            transform: scale(1);
            opacity: 1;
        }
        .modal.desvanecer .modal-content {
            transform: scale(0.85);
            opacity: 0;
        }

        .modal-img-container {
            background: radial-gradient(circle, #2d113d 0%, #0d0d0d 100%);
            border-radius: 16px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            border: 1px solid #222;
        }
        .modal-img-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 3px;
            background: linear-gradient(90deg, #ff00ff, #7b00ff);
            border-radius: 2px;
        }
        .modal-img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .modal-titulo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin: 0 0 15px 0;
        }

        .info-row {
            border-top: 1px solid #1a1a1a;
            padding: 10px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .info-label {
            color: #ff4444;
            font-weight: 700;
        }
        .info-value {
            color: #22cc77;
            font-family: 'monospace';
            font-weight: bold;
        }
        .info-value.text-desc {
            color: #22cc77;
            font-family: 'Rajdhani', sans-serif;
        }

        .btn-copiar-icon {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 4px 6px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
        }
        .btn-copiar-icon:hover { color: #fff; background: #2a2a2a; }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-share {
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 10px;
            flex: 1;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
        }
        .btn-close {
            background: #141414;
            color: #ffffff;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 10px;
            flex: 2;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
        }

        /* --- TOAST NOTIFICACIÓN --- */
        .toast {
            visibility: hidden;
            background-color: #00ffaa;
            color: #000;
            font-weight: bold;
            text-align: center;
            border-radius: 30px;
            padding: 12px 25px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 4px 15px rgba(0,255,170,0.4);
        }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body>

    <h1>⚡ BIBLIOTECA DE IDs ⚡</h1>
    <p>Toca una skin para abrir el Visor • Vuelve a tocar para cerrarlo</p>
    
    <div class="search-box">
        <input type="text" id="buscador" placeholder="BUSCAR POR NOMBRE...">
    </div>

    <div class="filtros-container">
        <button class="btn-filtro activo" onclick="filteredCat('todos', this)">✨ Todos</button>
        <button class="btn-filtro" onclick="filteredCat('ojos', this)">👀 Avatares / Rostro</button>
        <button class="btn-filtro" onclick="filteredCat('mascara', this)">🎭 Máscaras</button>
        <button class="btn-filtro" onclick="filteredCat('chaqueta', this)">👕 Torso</button>
        <button class="btn-filtro" onclick="filteredCat('pantalones', this)">👖 Piernas</button>
        <button class="btn-filtro" onclick="filteredCat('dino', this)">Rex Dinos</button>
        <button class="btn-filtro" onclick="filteredCat('puños', this)">🤛 Puños</button>
    </div>

    <div class="contenedor" id="listaRopa"></div>

    <!-- VENTANA DE INFORMACIÓN FLOTANTE -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            
            <div class="modal-img-container">
                <img id="modalImagen" class="modal-img" src="" alt="">
            </div>
            
            <div id="modalNombre" class="modal-titulo">Nombre Item</div>
            
            <div class="info-row">
                <div>
                    <span class="info-label">Item id : </span>
                    <span id="modalId" class="info-value">00000000</span>
                </div>
                <button id="btnCopiarModal" class="btn-copiar-icon">📋 Copiar</button>
            </div>
            
            <div class="info-row">
                <div>
                    <span class="info-label">Icon id : </span>
                    <span id="modalIconId" class="info-value" style="font-size: 11px; word-break: break-all;">icon_id</span>
                </div>
            </div>
            
            <div class="info-row" style="border-bottom: 1px solid #1a1a1a;">
                <div>
                    <span class="info-label">Description : </span>
                    <span id="modalDesc" class="info-value text-desc">No Description</span>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-share" onclick="alert('¡ID Compartido!')">Share</button>
                <button class="btn-close" onclick="cerrarModal()">Close</button>
            </div>
            
        </div>
    </div>

    <div id="toastNotification" class="toast">📋 ¡ID COPIADO!</div>

    <script src="script.js"></script>
</body>
                        </html>
