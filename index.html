<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de IDs - Free Fire</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #ffbc00; }
        #buscador {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
        }
        .contenedor {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .tarjeta {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 15px;
            width: 150px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .tarjeta img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 5px;
            background-color: #333;
        }
        .id-texto {
            font-weight: bold;
            color: #00ffcc;
            background: #111;
            padding: 5px;
            border-radius: 3px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>📚 Biblioteca de IDs de Ropa</h1>
    <p>Busca tus skins y copia sus identificadores</p>
    
    <input type="text" id="buscador" placeholder="Buscar ropa por nombre..." onkeyup="filtrarRopa()">

    <div class="contenedor" id="listaRopa"></div>

    <script src="script.js"></script>
</body>
</html>
